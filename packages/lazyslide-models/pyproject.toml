[project]
name = "lazyslide-models"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Yimin Zheng", email = "yzheng@cemm.at" }
]
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.0.0",
    "timm>=1.0.3",
    "torch>=2.0.0",
    "transformers>=4.0.0",
]

[dependency-groups]
dev = [
    "hf-transfer>=0.1.9",
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-xdist>=3.0",
]
model = [
    "einops>=0.8.1",
    "einops-exts>=0.0.4",
    "environs>=14.1.1",
    "sacremoses>=0.1.1",
    "conch",
    "open-clip-torch>=2.32.0",
    "transformers>=4.49.0",
    "cellpose>=4.0.0",
    "musk",
    "fairscale>=0.4.13",
    "sentencepiece>=0.2.1",
    "diffusers>=0.36.0",
    "accelerate>=1.12.0",
]

[tool.pytest.ini_options]
markers = [
    "gated: model behind a gated HuggingFace repo",
    "slow: large or slow-to-load model",
]
addopts = "-n 4"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lazyslide_models"]
